live_config_reload = true

[window]
opacity = 0.85
title = "Terminal"
dynamic_title = false
dynamic_padding = true

[scrolling]
history = 10000
multiplier = 1

[font]
normal = { family = "FiraCode Nerd Font", style = "Regular" }
size = 12.0
builtin_box_drawing = true

[selection]
save_to_clipboard = true

[cursor]
style = { shape = "Beam", blinking = "On" }
unfocused_hollow = true
blink_interval = 550
blink_timeout = 0
thickness = 0.2
